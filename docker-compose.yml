services:
  homeassistant:
    container_name: homeassistant_dev
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      - ./config:/config
      - ./custom_components:/config/custom_components
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Pacific/Honolulu
    ports:
      - "8123:8123"
    restart: unless-stopped
